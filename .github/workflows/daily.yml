name: Pulse Daily Summary

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - run: pip install -r requirements.txt

      - run: python bot.py

      - uses: actions/upload-artifact@v4
        with:
          name: daily-summary
          path: daily_summary.txt